<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Task Card</title>
    <link rel="stylesheet" href="./src/styles.css" />
    <script src="./src/script.js" defer></script>
  </head>
  <body>
    <main class="page">
      <article class="todo-card priority-high" data-testid="test-todo-card">

        <!-- Top row: checkbox + priority badge -->
        <header class="todo-card__top-row">
          <div class="todo-card__check-wrap">
            <input
              id="todo-complete-toggle"
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task complete"
            />
            <label for="todo-complete-toggle">Complete</label>
          </div>
          <span
            class="badge badge--priority"
            data-testid="test-todo-priority"
            aria-label="Priority badge"
          >
            <span
              data-testid="test-todo-priority-indicator"
              data-priority="high"
              aria-label="Priority: High"
            ></span>
            High
          </span>
        </header>

        <!-- Eyebrow -->
        <p class="todo-card__eyebrow">Today focus</p>

        <!-- Title -->
        <h2 class="todo-card__title" data-testid="test-todo-title">
          Prepare sprint planning summary
        </h2>

        <!-- Description (short, no collapse needed by default) -->
        <p class="todo-card__description" data-testid="test-todo-description">
          Review backlog priorities, estimate effort, and draft the planning deck for Monday.
        </p>

        <!-- Expand toggle (hidden until needed) -->
        <div class="todo-card__expand-row">
          <button
            type="button"
            data-testid="test-todo-expand-toggle"
            aria-expanded="false"
            aria-controls="todo-collapsible"
            hidden
          >
            Show more
          </button>
        </div>

        <!-- Collapsible extended content -->
        <div
          id="todo-collapsible"
          data-testid="test-todo-collapsible-section"
          aria-label="Extended task details"
        ></div>

        <!-- Meta: due date + time remaining + overdue -->
        <div class="todo-card__meta">
          <time data-testid="test-todo-due-date" datetime="2026-06-01T18:00:00Z">
            Due Jun 1, 2026
          </time>
          <time data-testid="test-todo-time-remaining" aria-live="polite">Calculating...</time>
          <span
            data-testid="test-todo-overdue-indicator"
            role="status"
            aria-live="polite"
            hidden
          >Overdue</span>
        </div>

        <!-- Rail: status badge + status control -->
        <div class="todo-card__status-row">
          <span class="badge badge--status" data-testid="test-todo-status" data-status="pending">
            Pending
          </span>
          <label for="todo-status-control" class="sr-only">Change status</label>
          <select
            id="todo-status-control"
            data-testid="test-todo-status-control"
            aria-label="Change task status"
          >
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Done">Done</option>
          </select>
        </div>

        <!-- Tags -->
        <div class="todo-card__tags" data-testid="test-todo-tags">
          <ul>
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
          </ul>
        </div>

        <!-- Action buttons -->
        <div class="todo-card__actions">
          <button type="button" data-testid="test-todo-edit-button" aria-label="Edit task">
            Edit
          </button>
          <button type="button" data-testid="test-todo-delete-button" aria-label="Delete task">
            Delete
          </button>
        </div>

        <!-- Edit form (hidden by default) -->
        <form
          class="todo-card__edit-form"
          data-testid="test-todo-edit-form"
          hidden
          novalidate
          aria-label="Edit task"
        >
          <div class="form-group">
            <label for="edit-title">Title</label>
            <input
              id="edit-title"
              type="text"
              data-testid="test-todo-edit-title-input"
              placeholder="Task title"
              autocomplete="off"
            />
          </div>

          <div class="form-group">
            <label for="edit-description">Description</label>
            <textarea
              id="edit-description"
              data-testid="test-todo-edit-description-input"
              placeholder="Task description"
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="edit-priority">Priority</label>
              <select id="edit-priority" data-testid="test-todo-edit-priority-select">
                <option value="High">High</option>
                <option value="Medium">Medium</option>
                <option value="Low">Low</option>
              </select>
            </div>

            <div class="form-group">
              <label for="edit-due-date">Due date</label>
              <input
                id="edit-due-date"
                type="date"
                data-testid="test-todo-edit-due-date-input"
              />
            </div>
          </div>

          <div class="form-actions">
            <button type="button" data-testid="test-todo-save-button" aria-label="Save changes">
              Save
            </button>
            <button type="button" data-testid="test-todo-cancel-button" aria-label="Cancel editing">
              Cancel
            </button>
          </div>
        </form>

      </article>
    </main>

    <!-- Visually hidden utility -->
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0,0,0,0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </body>
</html>
